# =============================================================================
# Flutter CI/CD Pipeline
# Course   : COMP 6910 — Mobile Applications Development
# Project  : Assignment 4 — National Parks Explorer
# Developer: Jahidul Arafat (JAJI)
# =============================================================================
#
# Triggers:
#   - Every push to main, master, develop
#   - Every pull request to main, master
#   - Manual trigger (workflow_dispatch)
#
# Jobs:
#   1. analyze   — flutter analyze (errors only)
#   2. test      — flutter test (51 tests / 10 groups)
#   3. build-ios — flutter build ios --no-codesign
#   4. report    — CI summary
# =============================================================================

name: 🏞️ National Parks — Flutter CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'

# =============================================================================
# JOB 1: Static Analysis
# =============================================================================
jobs:
  analyze:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Run Flutter Analyze
        run: flutter analyze

      - name: ✅ Analysis summary
        if: success()
        run: |
          echo "## 🔍 Static Analysis" >> $GITHUB_STEP_SUMMARY
          echo "✅ No issues found" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 2: Widget Tests (51 tests / 10 groups)
# =============================================================================
  test:
    name: 🧪 Tests (51)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧪 Run tests
        run: flutter test --reporter expanded

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage/lcov.info
          flags: widget-tests
          name: national-parks-coverage
          fail_ci_if_error: false
        continue-on-error: true

      - name: ✅ Test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | 51 |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Groups | 10 |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ env.FLUTTER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 3: Build iOS (no code signing)
# =============================================================================
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    timeout-minutes: 30
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🍎 Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: 📦 Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
          if-no-files-found: warn

      - name: ✅ Build summary
        if: success()
        run: |
          echo "## 🍎 iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build succeeded (no codesign)" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 4: CI Summary Report
# =============================================================================
  report:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [analyze, test, build-ios]
    if: always()

    steps:
      - name: 📋 Write CI summary
        run: |
          echo "# 🏞️ National Parks Explorer — CI Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Static Analysis | ${{ needs.analyze.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests (51) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 Build iOS | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## App Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | National Parks Explorer |" >> $GITHUB_STEP_SUMMARY
          echo "| Course | COMP 6910 — Assignment 4 |" >> $GITHUB_STEP_SUMMARY
          echo "| Developer | Jahidul Arafat (JAJI) |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ env.FLUTTER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | 51 / 10 groups |" >> $GITHUB_STEP_SUMMARY
          echo "| API | NPS Developer API |" >> $GITHUB_STEP_SUMMARY
